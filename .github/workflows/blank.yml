# This is a basic workflow to help you get started with Actions



name: iOS Superbuild — make deps

on:
  workflow_dispatch:

concurrency:
  group: ios-superbuild-${{ github.ref }}
  cancel-in-progress: true

env:
  # TODO: fill in when ready
  REPO_URL: https://projects.blender.org/Testifya/blender.git
  REPO_BRANCH: ios-deps-fix

jobs:
  make-deps:
    runs-on: macos-latest
    timeout-minutes: 350
          

    steps:
      - name: Clone
        run: |
          git clone --branch "$REPO_BRANCH" "$REPO_URL" blender
          cd blender
          git submodule update --init --remote --recursive

      - name: Resolve deps paths
        run: |
          echo "DEPS_HOST_DIR=${{ github.workspace }}/blender/build_darwin/deps_arm64" >> "$GITHUB_ENV"
          echo "DEPS_IOS_DIR=${{ github.workspace }}/blender/build_ios/deps_arm64" >> "$GITHUB_ENV"

      - name: Restore host deps cache
        uses: actions/cache@v4
        with:
          path: ${{ env.DEPS_HOST_DIR }}
          key: make-deps-host-${{ hashFiles('blender/build_files/build_environment/**') }}
          restore-keys: make-deps-host-

      - name: make deps (host)
        working-directory: blender
        run: make deps

      - name: Restore iOS deps cache
        uses: actions/cache@v4
        with:
          path: ${{ env.DEPS_IOS_DIR }}
          key: make-deps-ios-${{ hashFiles('blender/build_files/build_environment/**') }}
          restore-keys: make-deps-ios-

      - name: make deps ios
        working-directory: blender
        run: make deps ios

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: make-deps-logs
          path: |
            ${{ env.DEPS_HOST_DIR }}/**/*.log
            ${{ env.DEPS_IOS_DIR }}/**/*.log
          retention-days: 7
